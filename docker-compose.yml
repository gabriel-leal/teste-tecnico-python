services:
  api:
    build: .
    container_name: todo_api
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    env_file:
      - .env
    networks:
      - todo_network
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: todo_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    networks:
      - todo_network
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

networks:
  todo_network:
    driver: bridge